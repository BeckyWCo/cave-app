<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cave — Wine Stock</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #ede7d9;
    --surface2: #e4ddd0;
    --ink: #2c2825;
    --ink-dim: #7a7067;
    --accent: #4a3f35;
    --red: #8b2535;
    --green: #2d6b4a;
    --border: rgba(44,40,37,0.15);
    --border-soft: rgba(44,40,37,0.08);
    --serif: 'Cormorant Garamond', Georgia, serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--serif);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    padding: 32px 20px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .header-eyebrow {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--ink-dim);
    text-transform: uppercase;
    font-weight: 300;
    font-style: italic;
    margin-bottom: 6px;
  }
  .header-box {
    font-size: 34px;
    color: var(--ink);
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .header-meta {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .chip {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 2px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--ink-dim);
    font-weight: 300;
  }
  .chip.crd { color: #2a5a8b; border-color: rgba(42,90,139,0.3); background: rgba(42,90,139,0.06); }
  .chip.daa { color: #7a5a1a; border-color: rgba(122,90,26,0.3); background: rgba(122,90,26,0.06); }

  /* LOADING */
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    gap: 16px;
  }
  .loader {
    width: 36px; height: 36px;
    border: 1.5px solid var(--border);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text {
    font-size: 12px;
    letter-spacing: 0.25em;
    color: var(--ink-dim);
    text-transform: uppercase;
    font-weight: 300;
    font-style: italic;
  }

  /* ERROR */
  #error-view {
    display: none;
    padding: 40px 20px;
    text-align: center;
  }
  .error-msg {
    font-size: 14px;
    color: var(--red);
    margin-top: 8px;
    font-style: italic;
  }

  /* NO BOX */
  #no-box {
    display: none;
    padding: 40px 20px;
    text-align: center;
  }
  .no-box-title {
    font-size: 32px;
    font-style: italic;
    color: var(--ink);
    font-weight: 300;
    margin-bottom: 8px;
  }
  .no-box-text {
    font-size: 14px;
    color: var(--ink-dim);
    line-height: 1.8;
    font-style: italic;
  }
  .demo-picker { margin-top: 28px; }
  .demo-label {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--ink-dim);
    text-transform: uppercase;
    font-weight: 300;
    margin-bottom: 12px;
  }
  .demo-buttons { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .demo-btn {
    font-family: var(--serif);
    font-size: 14px;
    padding: 10px 18px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--surface);
    color: var(--ink);
    cursor: pointer;
    letter-spacing: 0.05em;
  }

  /* WINE LIST */
  #wine-list { display: none; padding-bottom: 60px; }

  .list-header {
    padding: 14px 20px 12px;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-dim);
    border-bottom: 1px solid var(--border-soft);
    font-weight: 300;
    font-style: italic;
  }
  .list-header span { color: var(--ink); font-style: normal; }

  /* WINE CARD */
  .wine-card {
    padding: 20px 20px;
    border-bottom: 1px solid var(--border-soft);
    position: relative;
    animation: fadeUp 0.3s ease both;
    background: var(--bg);
  }
  .wine-card:hover { background: var(--surface); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .wine-card::before {
    content: '';
    position: absolute;
    left: 0; top: 20px; bottom: 20px;
    width: 3px;
    border-radius: 0 2px 2px 0;
  }
  .wine-card.rouge::before { background: #8b2535; }
  .wine-card.blanc::before { background: #b89a3a; }
  .wine-card.rose::before  { background: #c4748a; }

  .wine-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 8px;
  }
  .wine-name {
    font-size: 18px;
    font-style: italic;
    line-height: 1.25;
    flex: 1;
    font-weight: 400;
    color: var(--ink);
  }
  .wine-stock {
    text-align: right;
    flex-shrink: 0;
  }
  .wine-stock-num {
    font-size: 28px;
    color: var(--ink);
    font-weight: 300;
    line-height: 1;
  }
  .wine-stock-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-dim);
    text-transform: uppercase;
    font-weight: 300;
  }

  .wine-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 16px;
  }
  .tag {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
    background: var(--surface2);
    border: 1px solid var(--border-soft);
    color: var(--ink-dim);
    font-weight: 300;
  }
  .tag.rouge { color: #8b2535; border-color: rgba(139,37,53,0.25); background: rgba(139,37,53,0.06); }
  .tag.blanc { color: #7a6520; border-color: rgba(122,101,32,0.25); background: rgba(122,101,32,0.06); }
  .tag.rose  { color: #9a4a5a; border-color: rgba(154,74,90,0.25); background: rgba(154,74,90,0.06); }

  /* BUTTON */
  .btn-movement {
    display: block;
    width: 100%;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--accent);
    color: #f5f0e8;
    font-family: var(--serif);
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.15s;
    font-weight: 300;
  }
  .btn-movement:active { background: var(--ink); }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Cave à Vin — Stock Management</div>
  <div id="header-box" class="header-box">—</div>
  <div id="header-meta" class="header-meta" style="display:none"></div>
</div>

<div id="loading">
  <div class="loader"></div>
  <div class="loader-text">Loading box…</div>
</div>

<div id="error-view">
  <div style="font-size:28px">⚠️</div>
  <div class="error-msg" id="error-msg"></div>
</div>

<div id="no-box">
  <div class="no-box-title">No box selected</div>
  <div class="no-box-text">Scan a QR code to open a box.<br>Or select one below:</div>
  <div class="demo-picker">
    <div class="demo-label">— Available boxes —</div>
    <div class="demo-buttons" id="demo-buttons"></div>
  </div>
</div>

<div id="wine-list">
  <div class="list-header"><span id="wine-count">—</span> wines in this box</div>
  <div id="wines-container"></div>
</div>

<script>
const API_KEY  = 'patEtTcX2qcm8PA8I.1fe1cb4da210578416290f34f0c13938383e20bb222829551fbc12c2d209e016';
const BASE_ID  = 'appGTKbGOZeTIeZRx';
const FORM_URL = 'https://airtable.com/appGTKbGOZeTIeZRx/pag9aUXruQYcS7yUt/form';

async function airtable(table, params = {}) {
  let urlStr = `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(table)}?`;
  const parts = [];
  Object.entries(params).forEach(([k, v]) => {
    if (Array.isArray(v)) {
      v.forEach(vi => parts.push(`fields%5B%5D=${encodeURIComponent(vi)}`));
    } else {
      parts.push(`${encodeURIComponent(k)}=${encodeURIComponent(v)}`);
    }
  });
  urlStr += parts.join('&');
  const res = await fetch(urlStr, { headers: { Authorization: `Bearer ${API_KEY}` } });
  if (!res.ok) throw new Error(`API error ${res.status}`);
  return res.json();
}

function colourClass(c = '') {
  const v = c.toLowerCase();
  if (v.includes('rouge') || v.includes('red')) return 'rouge';
  if (v.includes('blanc') || v.includes('white')) return 'blanc';
  if (v.includes('ros')) return 'rose';
  return '';
}

function show(id) {
  ['loading','error-view','no-box','wine-list'].forEach(i => {
    document.getElementById(i).style.display = i === id ? 'block' : 'none';
  });
}

function formUrl(boxRecId, wineRecId) {
  const p = new URLSearchParams();
  if (boxRecId)  p.set('prefill_Box', boxRecId);
  if (wineRecId) p.set('prefill_Wine', wineRecId);
  return `${FORM_URL}?${p.toString()}`;
}

function renderWine(wine, boxRecId) {
  const f = wine.fields;
  const name        = f['Wine Name'] || f['Name'] || 'Unknown wine';
  const domaine     = f['Domaine'] || '';
  const appellation = f['Appellation'] || '';
  const vintage     = f['Vintage'] || '';
  const colour      = f['Colour'] || '';
  const inStock     = f['In Stock'] ?? '—';
  const cc          = colourClass(colour);

  const card = document.createElement('div');
  card.className = `wine-card ${cc}`;
  card.style.animationDelay = `${Math.random() * 0.2}s`;

  const tags = [vintage, domaine, appellation, colour]
    .filter(Boolean)
    .map(t => {
      const cls = (t === colour) ? cc : '';
      return `<span class="tag ${cls}">${t}</span>`;
    }).join('');

  card.innerHTML = `
    <div class="wine-top">
      <div class="wine-name">${name}</div>
      <div class="wine-stock">
        <div class="wine-stock-num">${inStock}</div>
        <div class="wine-stock-label">in stock</div>
      </div>
    </div>
    <div class="wine-tags">${tags}</div>
    <a class="btn-movement" href="${formUrl(boxRecId, wine.id)}" target="_blank">
      + New Movement
    </a>
  `;
  return card;
}

async function loadBox(boxId) {
  document.getElementById('header-box').textContent = boxId;

  try {
    const boxData = await airtable('Boxes', {
      filterByFormula: `{Box ID} = "${boxId}"`,
      maxRecords: 1,
    });

    if (!boxData.records?.length) throw new Error(`Box "${boxId}" not found`);

    const box      = boxData.records[0];
    const boxRecId = box.id;
    const location = box.fields['Location'] || '';
    const tax      = box.fields['TAX'] || '';

    const meta = document.getElementById('header-meta');
    meta.style.display = 'flex';
    if (location) meta.innerHTML += `<span class="chip">${location}</span>`;
    if (tax)      meta.innerHTML += `<span class="chip ${tax.toLowerCase()}">${tax}</span>`;

    // Load all wines - no fields filter to avoid encoding issues
    const winesData = await airtable('Wines', {
      maxRecords: 500,
    });

    const wines = (winesData.records || []).filter(w => {
      const boxes = w.fields['Box'];
      if (!boxes) return false;
      // Box field can contain record IDs (array) or text values
      if (Array.isArray(boxes)) {
        return boxes.some(b => b === boxRecId || b === boxId || (b && b.id === boxRecId));
      }
      return boxes === boxId || boxes === boxRecId;
    });

    if (!wines.length) {
      throw new Error(`No wines found in ${boxId}. Make sure wines are linked to this box.`);
    }

    show('wine-list');
    document.getElementById('wine-count').textContent = wines.length;
    const container = document.getElementById('wines-container');
    wines.forEach(w => container.appendChild(renderWine(w, boxRecId)));

  } catch(err) {
    console.error(err);
    show('error-view');
    document.getElementById('error-msg').textContent = err.message;
  }
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const boxId  = params.get('box') || params.get('boxId') || params.get('id');

  if (!boxId) {
    show('no-box');
    document.getElementById('header-box').textContent = 'Cave à Vin';

    try {
      const data = await airtable('Boxes', {
        fields: ['Box ID'],
        filterByFormula: `{Status} = "Active"`,
        maxRecords: 50,
      });
      const btns = document.getElementById('demo-buttons');
      (data.records || []).forEach(r => {
        const id = r.fields['Box ID'];
        if (!id) return;
        const b = document.createElement('button');
        b.className = 'demo-btn';
        b.textContent = id;
        b.onclick = () => { window.location.search = `?box=${encodeURIComponent(id)}`; };
        btns.appendChild(b);
      });
    } catch(e) {
      ['BOX-1'].forEach(id => {
        const b = document.createElement('button');
        b.className = 'demo-btn';
        b.textContent = id;
        b.onclick = () => { window.location.search = `?box=${id}`; };
        document.getElementById('demo-buttons').appendChild(b);
      });
    }
    return;
  }

  await loadBox(boxId);
}

init();
</script>
</body>
</html>
